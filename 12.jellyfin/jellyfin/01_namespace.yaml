apiVersion: v1
kind: Namespace
metadata:
  name: jellyfin
  labels:
    # Jellyfin stores its config/SQLite library on a Talos UserVolume mounted
    # via a hostPath volume (see 03_deployment.yaml). hostPath is forbidden by
    # the "baseline" and "restricted" PodSecurity profiles, so the namespace
    # must opt into "privileged" — same reasoning as the tailscale namespace.
    # The container itself does NOT request extra capabilities or privileged
    # mode; only the hostPath volume forces this profile.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/audit: privileged

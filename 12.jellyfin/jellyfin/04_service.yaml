apiVersion: v1
kind: Service
metadata:
  name: jellyfin
  namespace: jellyfin
spec:
  # ClusterIP: Jellyfin is reached only through the Traefik Ingress, no dedicated
  # LoadBalancer IP. CoreDNS/Pi-hole resolve jellyfin.${DOMAIN} → Traefik.
  type: ClusterIP
  selector:
    app: jellyfin
  ports:
    - name: http
      port: 8096
      targetPort: http
      protocol: TCP

apiVersion: v1
kind: Service
metadata:
  name: pihole
  namespace: pihole
  annotations:
    # Fixed IP from the MetalLB pool — clients need a stable DNS address
    metallb.io/loadBalancerIPs: ${PIHOLE_IP}
spec:
  type: LoadBalancer
  selector:
    app: pihole
  ports:
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP
    - name: web
      port: 80
      targetPort: web
      protocol: TCP

apiVersion: v1
kind: Service
metadata:
  name: pihole
  namespace: pihole
  annotations:
    # Fixed IP from the MetalLB pool — clients need a stable DNS address
    metallb.io/loadBalancerIPs: ${PIHOLE_IP}
spec:
  type: LoadBalancer
  # Local preserves the real client source IP (no SNAT, no node-to-node hop):
  # Pi-hole logs show the actual querier instead of the cluster pod-network IP.
  # Safe with MetalLB L2, which advertises the IP only from a node running a Pod.
  externalTrafficPolicy: Local
  selector:
    app: pihole
  ports:
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
      protocol: TCP
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP
    - name: web
      port: 80
      targetPort: web
      protocol: TCP

apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole
  namespace: pihole
  labels:
    app: pihole
spec:
  replicas: 1
  # Recreate avoids two instances writing the same gravity DB during a rollout
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: pihole
  template:
    metadata:
      labels:
        app: pihole
    spec:
      containers:
        - name: pihole
          # Pin to a specific version — check latest stable at https://hub.docker.com/r/pihole/pihole/tags
          image: pihole/pihole:2025.08.0
          env:
            - name: TZ
              value: "Europe/Rome"
            # Run FTL as root (instead of dropping to uid/gid 1000) so it can
            # write to /etc/pihole on the persistent hostPath, which the kubelet
            # creates as root:root 0755. This removes the need for a chown
            # initContainer. Acceptable here: the namespace is already
            # "privileged" and the container starts as root anyway.
            - name: PIHOLE_UID
              value: "0"
            - name: PIHOLE_GID
              value: "0"
            # Pi-hole v6 configuration via FTLCONF_* env vars
            - name: FTLCONF_webserver_api_password
              valueFrom:
                secretKeyRef:
                  name: pihole-webpassword
                  key: WEBPASSWORD
            # Listen on all interfaces — required inside a Pod, traffic arrives via the Service
            - name: FTLCONF_dns_listeningMode
              value: "all"
            - name: FTLCONF_dns_upstreams
              value: "1.1.1.1;8.8.8.8"
            # Wildcard: any name under DOMAIN resolves to Traefik, same logic as
            # the CoreDNS template for Tailscale clients. Declared here (not via
            # UI records) so it is versioned and survives Pod restarts (emptyDir).
            # More-specific overrides win, e.g. "address=/nas.${DOMAIN}/<NAS_IP>"
            # on an extra line.
            # TRAEFIK_EXT_IP is Traefik's MetalLB external IP (LAN-routable), NOT
            # the ClusterIP that CoreDNS uses: LAN clients cannot reach the
            # cluster Service CIDR, only Tailscale clients (which route it) can.
            - name: FTLCONF_misc_dnsmasq_lines
              value: "address=/${DOMAIN}/${TRAEFIK_EXT_IP}"
            # The FRITZ!Box forwards the whole LAN's queries from its single IP,
            # which would trip FTL's per-client rate limit (1000 queries/min).
            # 0 disables rate limiting.
            - name: FTLCONF_dns_rateLimit_count
              value: "0"
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: web
              containerPort: 80
              protocol: TCP
          # On a fresh volume the first gravity build waits up to 120s for DNS
          # then downloads the lists, and FTL does not bind port 53 until it
          # finishes — longer than the liveness budget (delay 30s + 3×30s). The
          # startupProbe gates liveness/readiness until FTL is actually up
          # (~300s headroom), so the container is not killed mid-bootstrap.
          startupProbe:
            tcpSocket:
              port: dns-tcp
            periodSeconds: 10
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /admin/
              port: web
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: dns-tcp
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: pihole-data
              mountPath: /etc/pihole
      volumes:
        # Settings + gravity SQLite DB on the local Talos disk (persistent,
        # SQLite-safe — unlike the SMB shares). Subdirectory on the existing
        # hdd-data-1 UserVolume, so no extra OS-level provisioning is needed.
        # Survives Pod restarts: settings and blocklists are no longer re-downloaded.
        - name: pihole-data
          hostPath:
            path: /var/mnt/hdd-data-1/pihole-data
            type: DirectoryOrCreate

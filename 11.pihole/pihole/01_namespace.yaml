apiVersion: v1
kind: Namespace
metadata:
  name: pihole
  labels:
    # Pi-hole's container starts as root (s6 init, binds port 53, drops to its
    # internal user by itself) and cannot satisfy the "restricted" profile.
    # Declaring "baseline" here overrides the cluster-wide warn/audit=restricted
    # default set by Talos, silencing the PodSecurity warning at apply time.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: baseline
    pod-security.kubernetes.io/audit: baseline

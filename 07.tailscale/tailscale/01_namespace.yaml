apiVersion: v1
kind: Namespace
metadata:
  name: tailscale
  labels:
    # Tailscale requires NET_ADMIN, SYS_MODULE and a hostPath volume (/dev/net/tun)
    # which are incompatible with the "restricted" policy — "privileged" is required.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/audit: privileged

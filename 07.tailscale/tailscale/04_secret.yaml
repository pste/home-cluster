apiVersion: v1
kind: Secret
metadata:
  name: tailscale-auth
  namespace: tailscale
type: Opaque
stringData:
  # Real value substituted from .env (TS_AUTHKEY) via envsubst at apply time.
  # After the first join the pod persists its identity in the "tailscale-state"
  # Secret, so re-applying an expired auth key is harmless.
  TS_AUTHKEY: ${TS_AUTHKEY}
